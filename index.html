<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoreMC</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0d0d;
    color: #fff;
    font-family: 'VT323', monospace;
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,30,30,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,30,30,0.04) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 2rem;
  }

  .pixel-border {
    display: inline-block;
    padding: 3rem 5rem;
    border: 4px solid #8b0000;
    box-shadow:
      inset 0 0 0 4px #0d0d0d,
      inset 0 0 0 8px #8b0000,
      0 0 40px rgba(139,0,0,0.4);
  }

  h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(2rem, 8vw, 4.5rem);
    color: #ff2222;
    text-shadow: 4px 4px 0 #8b0000, 0 0 30px rgba(255,34,34,0.5);
    letter-spacing: 0.05em;
    line-height: 1.3;
    margin-bottom: 1rem;
    animation: flicker 4s infinite;
  }

  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.8; }
    97% { opacity: 1; }
    98% { opacity: 0.7; }
  }

  .subtitle {
    font-size: 1.8rem;
    color: #cc4444;
    letter-spacing: 0.2em;
    margin-bottom: 2rem;
  }

  .hearts {
    font-size: 1.6rem;
    color: #ff2222;
    letter-spacing: 0.6em;
    margin-bottom: 2.5rem;
    animation: heartbeat 1.5s ease-in-out infinite;
  }

  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }

  .shop-btn {
    display: inline-block;
    padding: 1rem 2.5rem;
    background: #8b0000;
    color: #fff;
    font-family: 'Press Start 2P', monospace;
    font-size: 0.85rem;
    text-decoration: none;
    letter-spacing: 0.1em;
    border: 4px solid #ff2222;
    box-shadow: 4px 4px 0 #ff2222;
    transition: all 0.1s;
    cursor: pointer;
  }

  .shop-btn:hover {
    background: #ff2222;
    box-shadow: 2px 2px 0 #8b0000;
    transform: translate(2px, 2px);
  }

  .server-type {
    margin-top: 2.5rem;
    font-size: 1.2rem;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.15em;
  }

  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .pixel {
    position: absolute;
    background: #8b0000;
    opacity: 0;
    animation: fall var(--d) var(--delay) infinite linear;
  }

  @keyframes fall {
    0% { transform: translateY(-10px); opacity: 0.6; }
    100% { transform: translateY(100vh); opacity: 0; }
  }
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="container">
  <div class="pixel-border">
    <h1>CoreMC</h1>
    <div class="subtitle">LIFESTEAL SMP</div>
    <div class="hearts">&#9829; &#9829; &#9829; &#9829; &#9829;</div>
    <a href="shop.html" class="shop-btn">OPEN SHOP</a>
    <div class="server-type">SURVIVAL &nbsp;|&nbsp; PVP &nbsp;|&nbsp; LIFESTEAL</div>
  </div>
</div>

<script>
  const container = document.getElementById('particles');
  for (let i = 0; i < 25; i++) {
    const p = document.createElement('div');
    p.className = 'pixel';
    p.style.cssText = `left:${Math.random()*100}%; --d:${5+Math.random()*8}s; --delay:${Math.random()*8}s; width:${4+Math.random()*6}px; height:${4+Math.random()*6}px;`;
    container.appendChild(p);
  }
</script>
</body>
</html>
